<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="World Cup 2026 Sweepstake">
  <!-- Ink full-bleed tile, sharp corners (campaign-tile / rounded.none) -->
  <rect width="512" height="512" fill="#111111"/>
  <!-- White ball -->
  <circle cx="256" cy="256" r="186" fill="#ffffff"/>
  <clipPath id="ball">
    <circle cx="256" cy="256" r="186"/>
  </clipPath>
  <g clip-path="url(#ball)" fill="#111111">
    <!-- Seams first (under panels): center-pentagon vertices to rim panel vertices -->
    <g stroke="#111111" stroke-width="15" stroke-linecap="round">
      <line x1="256"   y1="198"   x2="256"   y2="118"/>
      <line x1="311.2" y1="238.1" x2="387.2" y2="213.3"/>
      <line x1="290.1" y1="302.9" x2="337.1" y2="367.7"/>
      <line x1="221.9" y1="302.9" x2="174.9" y2="367.7"/>
      <line x1="200.8" y1="238.1" x2="124.8" y2="213.3"/>
    </g>
    <!-- Center pentagon -->
    <polygon points="256,198 311.2,238.1 290.1,302.9 221.9,302.9 200.8,238.1"/>
    <!-- Rim pentagons (one vertex pointing inward, clipped by ball) -->
    <polygon points="256,118 187.5,68.2 213.7,-12.2 298.3,-12.2 324.5,68.2"/>
    <polygon points="387.2,213.3 413.4,132.9 498.0,132.9 524.2,213.3 455.7,263.1"/>
    <polygon points="337.1,367.7 421.7,367.7 447.9,448.1 379.4,497.9 310.9,448.1"/>
    <polygon points="174.9,367.7 201.1,448.1 132.6,497.9 64.1,448.1 90.3,367.7"/>
    <polygon points="124.8,213.3 56.3,263.1 -12.2,213.3 14.0,132.9 98.6,132.9"/>
  </g>
  <!-- Crisp ball outline -->
  <circle cx="256" cy="256" r="186" fill="none" stroke="#111111" stroke-width="6"/>
</svg>
