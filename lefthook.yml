# Lefthook configuration for enforcing code quality and conventional commits
# See: https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

pre-commit:
  commands:
    check-env-production:
      run: sh scripts/check-env-production.sh
    biome-check:
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: npx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
